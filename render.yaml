services:
  - type: web
    name: portfol-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DODO_API_KEY
        value: skip
      - key: DODO_WEBHOOK_SECRET
        value: skip
      - key: DODO_PRODUCT_ID
        value: skip
